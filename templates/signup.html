<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stegbox Sign Up</title>
  <style>
    body {
      margin: 0;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      justify-content: center;
      align-items: center;
        height: 100vh;
      transition: background-color 0.3s;
      background-color: #f0f0f0; /* default background */
    }

    .login-card {
      background-color: #fff;
      padding: 40px 100px;
      border-radius: 20px;
      border: 1px solid #FD3DB5;
      box-shadow: 1px 1px 20px  #FD3DB5;
      width: 830px;
      height: 410px;
      text-align: center;
    }

    .login-card h2 {
      margin-bottom: 30px;
      font-size: 2em;
    }

    .login-card input[type="email"],
    .login-card input[type="username"], 
    .login-card input[type="password"] {
      width: 100%;
      padding: 10px 15px;
      margin: 10px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    .forgot-password {
      text-align: left;
      margin: 10px 0 0;
      color: #606060;
      font-size: 0.95em;
    }

    .forgot-password a {
      color: #606060;
      text-decoration: none;
    }

    .forgot-password a:hover {
      text-decoration: underline;
    }

    .login-card button {
      width: 100%;
      padding: 10px;
      margin: 35px 0 0 15px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    .login-card button:hover {
      box-shadow: 0 8px 16px #305CDE;
    }

    .login-card button.secondary {
      width: auto;
      padding: 10px 100px;
      display: inline-block;
      margin: 45px 0 15px 0;;
    }

    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 20px 0;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid #ccc;
    }

    .divider:not(:empty)::before {
      margin-right: 3em;
    }

    .divider:not(:empty)::after {
      margin-left: 3em;
    }
  </style>
</head>
<body>

  <div class="login-card">
    <h2>Sign up for Stegbox</h2>
    
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div style="background: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; padding: 12px; border-radius: 5px; margin-bottom: 20px; text-align: left;">
          {% for message in messages %}
            <p style="margin: 5px 0;">⚠ {{ message }}</p>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
    
    <form action="/signup" method="post">
      <input type="email" name="email" placeholder="Email" required>
      <input type="username" name="username" placeholder="Username" required>
      <input type="password" name="password" placeholder="Password" required>
      
      <button type="submit" class="secondary">Create new account</button>
    </form>
    <p>Have an account already? <a href="/">Log in</a></p>
    
  </div>



</body>
</html>
